name: Claude GTM Assistant

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_env: |
            CONTEXT: You are a GTM assistant supporting sales, marketing, and revenue operations.
